<!doctype html>
<html lang="es" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Planificá tu carrera de Ingeniería en Informática (UNLaM) y minimizá el tiempo hasta recibirte." />
    <title>Mi Carrera · UNLaM</title>
    <script>
      // Aplica el tema guardado antes de pintar, para evitar flash.
      try {
        const saved = localStorage.getItem('unlam-planner-theme');
        const dark = saved ? saved === 'dark' : true;
        document.documentElement.classList.toggle('dark', dark);
      } catch (_) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
