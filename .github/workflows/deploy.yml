name: Deploy a GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Un solo deploy a la vez.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      # Calcula el base path según el nombre del repo:
      #  - repo normal  →  /nombre-del-repo/
      #  - usuario.github.io  →  /
      - name: Calcular base path
        run: |
          NAME="${{ github.event.repository.name }}"
          if [[ "$NAME" == *.github.io ]]; then
            echo "BASE_PATH=/" >> "$GITHUB_ENV"
          else
            echo "BASE_PATH=/$NAME/" >> "$GITHUB_ENV"
          fi

      - name: Build
        run: npm run build

      - name: Subir artefacto
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publicar en Pages
        id: deployment
        uses: actions/deploy-pages@v4
